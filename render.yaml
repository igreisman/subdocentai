services:
  - type: web
    name: subdocentai-demo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false # set manually in Render dashboard
      - key: SMTP_USER
        sync: false # set manually in Render dashboard
      - key: SMTP_PASS
        sync: false # set manually in Render dashboard
